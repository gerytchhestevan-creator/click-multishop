[build]
  publish = "."
  command = "" # No build command for static site
  functions = "netlify/functions"

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Redireciona /api/* para as funções netlify de forma amigável
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
